# LLM Router Configuration
# Phase 1-3: all tasks use primary model
# Phase 5+: uncomment per-task overrides

default_model: ${PRIMARY_MODEL}
default_temperature: 0.3
default_max_tokens: 4096

local:
  base_url: ${OLLAMA_BASE_URL}
  model: ${OLLAMA_MODEL}
  temperature: 0.1

